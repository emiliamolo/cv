<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithmic Lab | Indice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="labstyle.css">
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 sidebar p-3 d-flex flex-column">
            <h4 class="font-mono text-info fw-bold mb-4 pt-2">/lab_bin</h4>
            
            <ul class="nav nav-pills flex-column mb-auto">
                <li>
                    <a href="#" class="nav-link active" onclick="changeGame('conway/index.html', this)">
                        <i class="bi bi-grid-3x3 me-2"></i> Game of Life
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" onclick="changeGame('flappyBird/index.html', this)">
                        <i class="bi bi-bird me-2"></i> Flappy Bird
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" onclick="changeGame('tateti/index.html', this)">
                        <i class="bi bi-x-lg me-2"></i> Ta-Te-Ti
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" onclick="changeGame('mandelbrot/index.html', this)">
                        <i class="bi bi-infinity me-2"></i> Mandelbrot Set
                    </a>
                </li>
            </ul>

            <div class="mt-auto pb-3">
                <a href="../../index.html" class="btn btn-outline-light btn-sm w-100 font-mono">
                    <i class="bi bi-house-door"></i> Portfolio
                </a>
            </div>
        </nav>

        <main class="col-md-9 col-lg-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h2 id="current-title" class="h4 font-mono text-white mb-0">Conway's Game of Life</h2>
                </div>
                <div class="text-end text-white-50 small">
                    <i class="bi bi-info-circle"></i> Cargando via iframe
                </div>
            </div>

            <div class="game-viewport shadow-lg">
                <div id="loader" class="position-absolute top-50 start-50 translate-middle text-center" style="z-index: 5;">
                    <div class="spinner-border text-info" role="status"></div>
                    <p class="font-mono mt-2 text-info small">Cargando modulo...</p>
                </div>
                    
                <iframe id="game-frame" src="about:blank" onload="hideLoader()"></iframe>
            </div>
        </main>
    </div>
</div>

<script>
    function changeGame(url, element) {
        const loader = document.getElementById('loader');
        const frame = document.getElementById('game-frame');

        loader.classList.remove('d-none');
        frame.style.opacity = "0";
        // Cambiar el src del iframe
        frame.src = url;

        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('current-title').innerText = element.innerText.trim();
    }
    function hideLoader() {
        const loader = document.getElementById('loader');
        const frame = document.getElementById('game-frame');
        
        loader.classList.add('d-none');
        frame.style.opacity = "1";
        frame.style.transition = "opacity 0.5s ease";
    }
    document.addEventListener('DOMContentLoaded', () => {
        // Buscamos el link que tiene la clase 'active' por defecto (el de Conway)
        const activeLink = document.querySelector('.nav-link.active');
        if (activeLink) {
            // Obtenemos la ruta del atributo onclick (tenemos que extraerla del string)
            // O más fácil: llamamos a la función con la ruta a mano la primera vez
            changeGame('conway/index.html', activeLink);
        }
    });
</script>

</body>
</html>
