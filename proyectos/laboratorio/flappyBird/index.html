<!DOCTYPE html>
<hmtl lang="en">
    <head><meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="flopyBird game implemented in JavaScript.">
        <meta name="keywords" content="flopyBird, JavaScript, game">
        <meta property="og:title" content="Floppy Bird">
        <meta property="og:description" content="Juega Floppy Bird, un divertido clon de Flappy Bird en JavaScript.">
        <meta property="og:image" content="icono.ico">
        <link rel="icon" href="icono.ico" type="image/x-icon">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="../../../style.css">
        <title>Floppy Bird</title>
    </head>
    <body>
        <div class="game-container">
            <div class="score-display">
                <div class="current-score">Score: <span id="current-score">0</span></div>
                <div class="high-score">High Score: <span id="high-score">0</span></div>
            </div>
            
            <div class="game-area">
                <canvas id="game-canvas" alt="floppy bird game"></canvas>
                
                <div id="start-screen" class="overlay">
                    <h1>Flappy Bird</h1>
                    <button id="start-button">Start Game</button>
                    <p>Press SPACE or tap to flap</p>
                </div>
                
                <div id="game-over-screen" class="overlay hidden">
                    <h2>Game Over!</h2>
                    <p>Score: <span id="final-score">0</span></p>
                    <button id="restart-button">Play Again</button>
                </div>
            </div>
            
            <div class="controls">
                <button id="pause-button" class="control-button hidden">Pause</button>
                <button id="reset-button" class="control-button">Reset</button>
            </div>
        </div>
        <script src="bird.js"></script>
    </body>
</hmtl>
